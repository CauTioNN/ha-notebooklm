name: Build add-on image

on:
  push:
    branches: [main]
    paths:
      - "notebooklm_login/**"
      - ".github/workflows/builder.yaml"
  workflow_dispatch:

jobs:
  build:
    name: Build ${{ matrix.arch }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        arch: [amd64, aarch64]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: home-assistant/builder@master
        with:
          args: |
            --${{ matrix.arch }} \
            --target /data/notebooklm_login \
            --image "{arch}-addon-notebooklm_login" \
            --docker-hub "ghcr.io/${{ github.repository_owner }}/ha-notebooklm" \
            --addon
