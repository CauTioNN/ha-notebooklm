add_research:
  fields:
    config_entry_id:
      required: false
      selector:
        config_entry:
          integration: notebooklm
    notebook_id:
      required: false
      selector:
        text:
    query:
      required: true
      selector:
        text:
    source:
      required: false
      default: web
      selector:
