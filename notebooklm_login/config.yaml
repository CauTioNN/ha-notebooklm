name: NotebookLM Login
slug: notebooklm_login
version: "0.2.0"
description: Interactive Google sign-in for the NotebookLM integration (runs Chromium inside Home Assistant).
url: https://github.com/CauTioNN/ha-notebooklm
# No prebuilt `image:` — Home Assistant builds the add-on from the Dockerfile.
# (A local /addons install with an `image:` set makes the Supervisor try to PULL
# that image and fail if it isn't published. Re-add an `image:` line only once a
# prebuilt image is actually published to GHCR for repository-based installs.)
arch:
  - aarch64
  - amd64
ingress: true
ingress_port: 8099
panel_icon: mdi:notebook-edit
panel_title: NotebookLM Login
init: false
map:
  - homeassistant_config:rw
options: {}
schema: {}
