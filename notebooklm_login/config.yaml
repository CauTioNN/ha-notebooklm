name: NotebookLM Login
slug: notebooklm_login
version: "0.2.1"
description: Interactive Google sign-in for the NotebookLM integration (runs Chromium inside Home Assistant).
url: https://github.com/CauTioNN/ha-notebooklm
# Prebuilt image published to GHCR by .github/workflows/builder.yaml. When the
# add-on is installed via the **repository URL**, the Supervisor PULLS this image
# (fast) instead of building the heavy Chromium Dockerfile on-device (which can
# take hours / run out of memory on a Pi). `{arch}` is substituted by HA.
# Requirement: the GHCR package must be PUBLIC, or the pull fails with 403.
# Note: a *local* /addons copy ignores this key and always builds locally — to
# get the pull, add the GitHub repo in the Add-on Store, don't copy files.
image: ghcr.io/cautionn/ha-notebooklm/{arch}-addon-notebooklm_login
arch:
  - aarch64
  - amd64
ingress: true
ingress_port: 8099
panel_icon: mdi:notebook-edit
panel_title: NotebookLM Login
init: false
map:
  - homeassistant_config:rw
options: {}
schema: {}
