name: NotebookLM Login
slug: notebooklm_login
version: "0.2.0"
description: Interactive Google sign-in for the NotebookLM integration (runs Chromium inside Home Assistant).
url: https://github.com/CauTioNN/ha-notebooklm
# When installed from a repository, Home Assistant pulls this prebuilt image
# instead of building locally. (Ignored for local /addons installs, which always
# build from the Dockerfile.) GHCR image names must be lowercase.
image: ghcr.io/cautionn/ha-notebooklm/{arch}-addon-notebooklm_login
arch:
  - aarch64
  - amd64
ingress: true
ingress_port: 8099
panel_icon: mdi:notebook-edit
panel_title: NotebookLM Login
init: false
map:
  - homeassistant_config:rw
options: {}
schema: {}
