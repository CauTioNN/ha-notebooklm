# NotebookLM — helpers, a "ask" script, and example automations.
#
# Install: copy this file to  config/packages/notebooklm.yaml  and make sure
# packages are enabled in configuration.yaml:
#
#   homeassistant:
#     packages: !include_dir_named packages
#
# Then restart Home Assistant. Everything below targets the *active notebook*
# you pick in the `select.notebooklm_active_notebook` dropdown — no IDs needed.

input_text:
  notebooklm_question:
    name: NotebookLM question
    icon: mdi:comment-question-outline
    max: 255

script:
  notebooklm_ask:
    alias: "NotebookLM: ask the active notebook"
    icon: mdi:robot-happy
    mode: single
    sequence:
      - action: notebooklm.ask
        data:
          question: "{{ states('input_text.notebooklm_question') }}"
        response_variable: nb
      - action: persistent_notification.create
        data:
          notification_id: notebooklm_answer
          title: "NotebookLM"
          message: "{{ nb.answer }}"

# Voice assistant (Assist): handles the "AskNotebook" intent triggered by the
# custom sentences in examples/custom_sentences/. Asks the ACTIVE notebook and
# speaks the answer back.
intent_script:
  AskNotebook:
    action:
      - action: notebooklm.ask
        data:
          question: "{{ question }}"
        response_variable: nb
    speech:
      text: "{{ nb.answer }}"

automation:
  # 1) Tell me (and optionally play) when a podcast/video/etc. finishes.
  - alias: "NotebookLM: artifact ready"
    triggers:
      - trigger: event
        event_type: notebooklm_artifact_ready
    actions:
      - action: persistent_notification.create
        data:
          title: "NotebookLM: {{ trigger.event.data.artifact_type }} ready"
          message: >-
            Your {{ trigger.event.data.artifact_type }} is ready.
            {% if trigger.event.data.url %}[Download]({{ trigger.event.data.url }}){% endif %}

  # 2) Daily spoken briefing: ask the active notebook a question every morning
  #    and announce it. Edit the time / question / notify target to taste.
  - alias: "NotebookLM: morning briefing"
    triggers:
      - trigger: time
        at: "07:30:00"
    actions:
      - action: notebooklm.ask
        data:
          question: "Give me a 3-sentence briefing of the most important points."
        response_variable: nb
      - action: notify.persistent_notification
        data:
          title: "Morning briefing"
          message: "{{ nb.answer }}"
    mode: single
