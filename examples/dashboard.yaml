# NotebookLM management card — paste into a dashboard (Edit dashboard → ⋮ →
# "Raw configuration editor", or "Add card → Manual" and paste this).
# Uses ONLY entities the integration creates automatically — no helpers,
# scripts or packages needed.
#
# NOTE: entity ids assume a single NotebookLM account. With more than one
# account HA appends _2 etc. — check Developer Tools → States if needed.
type: vertical-stack
cards:
  - type: markdown
    content: >
      ## 📓 NotebookLM

      בחר **מחברת פעילה**, כתוב שאלה ולחץ **שאל**. כל הכפתורים פועלים על המחברת
      הפעילה (בלי לרשום ID).

  - type: entities
    title: סטטוס ובחירה
    show_header_toggle: false
    entities:
      - entity: select.notebooklm_active_notebook
        name: מחברת פעילה
      - entity: sensor.notebooklm_authentication_status
        name: התחברות
      - entity: sensor.notebooklm_notebooks
        name: מספר מחברות

  - type: markdown
    content: >
      ### המחברות שלך

      {% for nb in state_attr('sensor.notebooklm_notebooks','notebooks') %}
      - **{{ nb.title }}** — {{ nb.sources_count }} מקורות
      {% endfor %}

  - type: entities
    title: שאל את המחברת הפעילה
    entities:
      - entity: text.notebooklm_question
        name: שאלה
      - entity: button.notebooklm_ask
        name: שלח שאלה

  - type: markdown
    content: >
      ### תשובה אחרונה

      {{ state_attr('sensor.notebooklm_last_answer','answer') or 'עדיין אין תשובה.' }}

  - type: grid
    columns: 2
    square: false
    cards:
      - type: button
        name: פודקאסט
        icon: mdi:podcast
        show_state: false
        tap_action:
          action: perform-action
          perform_action: notebooklm.generate_audio
      - type: button
        name: מבחן
        icon: mdi:help-box-outline
        show_state: false
        tap_action:
          action: perform-action
          perform_action: notebooklm.generate_quiz
      - type: button
        name: דוח
        icon: mdi:file-document-outline
        show_state: false
        tap_action:
          action: perform-action
          perform_action: notebooklm.generate_report
      - type: button
        name: מפת חשיבה
        icon: mdi:sitemap-outline
        show_state: false
        tap_action:
          action: perform-action
          perform_action: notebooklm.generate_mind_map

  - type: markdown
    content: >
      *פעולות יצירה ארוכות (פודקאסט/וידאו) רצות ברקע — תקבל התראה כשמוכן (ראו
      `examples/automations.yaml`).*
